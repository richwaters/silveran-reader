name: Silveran
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
    macOS: "15.0"
    watchOS: "10.0"
    tvOS: "17.0"
configs:
  Debug: debug
  Release: release
packages:
  SilveranKit:
    path: SilveranKit
targets:
  Silveran Reader (macOS):
    type: application
    platform: macOS
    supportedDestinations: [macOS]
    productName: "Silveran Reader"
    configFiles:
      Debug: XCodeWrapper/Configs/Debug.xcconfig
      Release: XCodeWrapper/Configs/Release.xcconfig
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: 15.0
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: XCodeWrapper/SilveranReaderMac.entitlements
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: XCodeWrapper/Info-macOS.plist
        MARKETING_VERSION: 0.1
        PRODUCT_BUNDLE_IDENTIFIER: "$(APP_BUNDLE_ID)"
        #INFOPLIST_KEY_CFBundleDisplayName: Silveran Reader
        #INFOPLIST_KEY_CFBundleName: Silveran Reader
        # Unknown why this redundant definition is needed for XCode to honor the app name
        PRODUCT_NAME: Silveran Reader
        #SWIFT_UPCOMING_FEATURE_NONSENDING_NONISOLATING_BY_DEFAULT: YES
        SWIFT_VERSION: 6.2
    info:
      path: XCodeWrapper/Info-macOS.plist
      properties:
        CFBundleName: "Silveran Reader"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        KEYCHAIN_ACCESS_GROUP: "$(KEYCHAIN_ACCESS_GROUP)"
        KEYCHAIN_SERVICE: "$(KEYCHAIN_SERVICE)"
        LSApplicationCategoryType: "public.app-category.books"
        NSLocalNetworkUsageDescription: "Silveran Reader needs local network access to connect to your Storyteller server."
        ITSAppUsesNonExemptEncryption: false
    sources:
      - path: XCodeWrapper
        excludes:
          - "**/*.entitlements"
          - "**/.DS_Store"
          - "Info-*.plist"
          - "WebResources/"
          - "Assets.xcassets/"
          - "project.yml"
          - "PrivacyInfo.xcprivacy"
      - path: XCodeWrapper/Assets.xcassets
        type: assetcatalog
      - path: XCodeWrapper/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: XCodeWrapper/WebResources
        type: folder
        buildPhase: resources
      - path: extern/foliate-js
        type: folder
        buildPhase: resources
        excludes:
          - "tests/"
          - ".github/"
          - "rollup/"
          - "*.md"
          - "package.json"
          - "package-lock.json"
          - "eslint.config.js"
          - "rollup.config.js"
          - ".git*"
    dependencies:
      - package: SilveranKit
        product: SilveranKitMacApp

  Silveran Reader (iOS):
    type: application
    platform: iOS
    productName: "Silveran Reader"
    configFiles:
      Debug: XCodeWrapper/Configs/Debug.xcconfig
      Release: XCodeWrapper/Configs/Release.xcconfig
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        CODE_SIGN_ENTITLEMENTS: XCodeWrapper/SilveranReaderIos.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: XCodeWrapper/Info-iOS.plist
        MARKETING_VERSION: 0.1
        PRODUCT_BUNDLE_IDENTIFIER: "$(APP_BUNDLE_ID)"
        #INFOPLIST_KEY_CFBundleDisplayName: Silveran Reader
        #INFOPLIST_KEY_CFBundleName: Silveran Reader
        PRODUCT_NAME: Silveran Reader
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        #SWIFT_UPCOMING_FEATURE_NONSENDING_NONISOLATING_BY_DEFAULT: YES
        SWIFT_VERSION: 6.2
    info:
      path: XCodeWrapper/Info-iOS.plist
      properties:
        CFBundleName: "Silveran Reader"
        CFBundleDisplayName: "Silveran Reader"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        KEYCHAIN_ACCESS_GROUP: "$(KEYCHAIN_ACCESS_GROUP)"
        KEYCHAIN_SERVICE: "$(KEYCHAIN_SERVICE)"
        LSApplicationCategoryType: "public.app-category.books"
        NSLocalNetworkUsageDescription: "Silveran Reader needs local network access to connect to your Storyteller server."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: SilveranKitiOSApp.CarPlaySceneDelegate
    sources:
      - path: XCodeWrapper
        excludes:
          - "**/*.entitlements"
          - "**/.DS_Store"
          - "Info-*.plist"
          - "WebResources/"
          - "Assets.xcassets/"
          - "project.yml"
          - "PrivacyInfo.xcprivacy"
      - path: XCodeWrapper/Assets.xcassets
        type: assetcatalog
      - path: XCodeWrapper/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: XCodeWrapper/WebResources
        type: folder
        buildPhase: resources
      - path: extern/foliate-js
        type: folder
        buildPhase: resources
        excludes:
          - "tests/"
          - ".github/"
          - "rollup/"
          - "*.md"
          - "package.json"
          - "package-lock.json"
          - "eslint.config.js"
          - "rollup.config.js"
          - ".git*"
    dependencies:
      - package: SilveranKit
        product: SilveranKitiOSApp
      - target: "Silveran Reader (watchOS)"
        embed: true
  Silveran Reader (watchOS):
    type: application
    platform: watchOS
    productName: "Silveran Reader"
    configFiles:
      Debug: XCodeWrapper/Configs/Debug.xcconfig
      Release: XCodeWrapper/Configs/Release.xcconfig
    settings:
      base:
        WATCHOS_DEPLOYMENT_TARGET: 10.0
        CODE_SIGN_ENTITLEMENTS: XCodeWrapper/SilveranReaderWatch.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: XCodeWrapper/Info-watchOS.plist
        MARKETING_VERSION: 0.1
        PRODUCT_BUNDLE_IDENTIFIER: "$(WATCH_APP_BUNDLE_ID)"
        PRODUCT_NAME: Silveran Reader
        SWIFT_VERSION: 6.2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: XCodeWrapper/Info-watchOS.plist
      properties:
        CFBundleName: "Silveran Reader"
        CFBundleDisplayName: "Silveran Reader"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        KEYCHAIN_ACCESS_GROUP: "$(KEYCHAIN_ACCESS_GROUP)"
        KEYCHAIN_SERVICE: "$(KEYCHAIN_SERVICE)"
        WKApplication: true
        WKBackgroundModes:
          - audio
        WKCompanionAppBundleIdentifier: "$(APP_BUNDLE_ID)"
    sources:
      - path: XCodeWrapper/EntryPointStub.swift
      - path: XCodeWrapper/WatchAssets.xcassets
        type: assetcatalog
    dependencies:
      - package: SilveranKit
        product: SilveranKitWatchApp
  Silveran Reader (tvOS):
    type: application
    platform: tvOS
    productName: "Silveran Reader"
    configFiles:
      Debug: XCodeWrapper/Configs/Debug.xcconfig
      Release: XCodeWrapper/Configs/Release.xcconfig
    settings:
      base:
        TVOS_DEPLOYMENT_TARGET: 17.0
        CODE_SIGN_ENTITLEMENTS: XCodeWrapper/SilveranReaderTV.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: XCodeWrapper/Info-tvOS.plist
        MARKETING_VERSION: 0.1
        PRODUCT_BUNDLE_IDENTIFIER: "$(APP_BUNDLE_ID)"
        PRODUCT_NAME: Silveran Reader
        SWIFT_VERSION: 6.2
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon"
    info:
      path: XCodeWrapper/Info-tvOS.plist
      properties:
        CFBundleName: "Silveran Reader"
        CFBundleDisplayName: "Silveran Reader"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        KEYCHAIN_ACCESS_GROUP: "$(KEYCHAIN_ACCESS_GROUP)"
        KEYCHAIN_SERVICE: "$(KEYCHAIN_SERVICE)"
        LSApplicationCategoryType: "public.app-category.books"
        UILaunchScreen: {}
        UIUserInterfaceStyle: Automatic
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
    sources:
      - path: XCodeWrapper/EntryPointStub.swift
      - path: XCodeWrapper/TVAssets.xcassets
        type: assetcatalog
    dependencies:
      - package: SilveranKit
        product: SilveranKitTVApp
schemes:
  "Silveran Reader (macOS)":
    shared: true
    build:
      targets:
        "Silveran Reader (macOS)": all
    run:
      config: Debug
      executable: "Silveran Reader (macOS)"
    test:
      config: Debug
      targets: []
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  "Silveran Reader (iOS)":
    shared: true
    build:
      targets:
        "Silveran Reader (iOS)": all
        "Silveran Reader (watchOS)": all
    run:
      config: Debug
      executable: "Silveran Reader (iOS)"
    test:
      config: Debug
      targets: []
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  "Silveran Reader (watchOS)":
    shared: true
    build:
      targets:
        "Silveran Reader (watchOS)": all
    run:
      config: Debug
      executable: "Silveran Reader (watchOS)"
    test:
      config: Debug
      targets: []
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  "Silveran Reader (tvOS)":
    shared: true
    build:
      targets:
        "Silveran Reader (tvOS)": all
    run:
      config: Debug
      executable: "Silveran Reader (tvOS)"
    test:
      config: Debug
      targets: []
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
